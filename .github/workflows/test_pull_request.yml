# Pull-request CI aggregator (Unity-MCP parity with test_pull_request.yml).
# Fans out, with fail-fast disabled so every leg reports independently:
#   (a) .NET build + xUnit  — a PR-aggregate copy of ci.yml's build/test
#   (b) godot-mcp-cli node tests (20/22) via the reusable test_cli.yml
#   (c) the godot_mcp addon-load smoke across Godot 4.3 / 4.4 / 4.5 (mono) via
#       the reusable test_godot_plugin.yml
#   (d) the runtime INTEGRATION harness across Godot 4.3 / 4.4 / 4.5 (mono) via
#       the reusable test_godot_runtime_harness.yml — downloads the released
#       gamedev-mcp-server, boots a HEADLESS GAME with the in-game runtime +
#       error capture, asserts a live SignalR roundtrip AND runtime-error capture
#       (issue #186). This is the half the #if TOOLS-excluded xUnit suite cannot
#       reach (connect/handshake/dispatch + in-game capture).
#
# NOTE: ci.yml is intentionally left untouched and still runs on push + PR; its
# job display name `dotnet build (.NET 8)` remains the canonical required check.
# The `dotnet-build-test` job below is an additional aggregate signal, NOT a
# rename of that check.
name: Test Pull Request

on:
  workflow_dispatch:
  pull_request:
    types: [opened, synchronize, reopened]

# Auto-cancel superseded runs when a new commit is pushed to the same PR, so
# intermediate pushes don't pile up runner time.
concurrency:
  group: test-pr-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  # (a) .NET build + xUnit (mirrors ci.yml; aggregate signal for this PR run).
  dotnet-build-test:
    name: dotnet build + test (.NET 8)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore Godot-MCP.sln

      - name: Build
        run: dotnet build Godot-MCP.sln --configuration Debug --no-restore

      - name: Test
        run: dotnet test Godot-MCP.Tests/Godot-MCP.Tests.csproj --configuration Debug --no-build --verbosity normal --collect:"XPlat Code Coverage" --results-directory TestResults

      # Coverage REPORTING only — no failing threshold. Publishes the cobertura report
      # produced by coverlet so progress is measurable; the gate never turns red on low coverage.
      - name: Upload .NET coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dotnet-coverage
          path: TestResults/**/coverage.cobertura.xml
          if-no-files-found: warn
          retention-days: 7

  # (b) godot-mcp-cli node tests (Node 20 & 22).
  test-cli:
    uses: ./.github/workflows/test_cli.yml

  # (c) godot_mcp addon-load smoke across the Godot engine matrix (mono).
  test-godot-4-3:
    uses: ./.github/workflows/test_godot_plugin.yml
    with:
      godotVersion: "4.3.0"

  test-godot-4-4:
    uses: ./.github/workflows/test_godot_plugin.yml
    with:
      godotVersion: "4.4.0"

  test-godot-4-5:
    uses: ./.github/workflows/test_godot_plugin.yml
    with:
      godotVersion: "4.5.1"

  # (d) the godot_mcp runtime INTEGRATION harness across the Godot engine matrix
  #     (mono). Each leg downloads the released gamedev-mcp-server, boots a
  #     headless game with the in-game runtime + error capture, and asserts the
  #     live SignalR roundtrip + runtime-error capture (issue #186). The 4.5 leg
  #     asserts the engine GDScript backtrace (#163); 4.3/4.4 assert graceful stub
  #     degradation.
  runtime-harness-4-3:
    uses: ./.github/workflows/test_godot_runtime_harness.yml
    with:
      godotVersion: "4.3.0"

  runtime-harness-4-4:
    uses: ./.github/workflows/test_godot_runtime_harness.yml
    with:
      godotVersion: "4.4.0"

  runtime-harness-4-5:
    uses: ./.github/workflows/test_godot_runtime_harness.yml
    with:
      godotVersion: "4.5.1"
