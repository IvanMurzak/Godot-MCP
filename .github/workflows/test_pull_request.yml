# Pull-request CI aggregator (Unity-MCP parity with test_pull_request.yml).
# Fans out, with fail-fast disabled so every leg reports independently:
#   (a) .NET build + xUnit  — a PR-aggregate copy of ci.yml's build/test
#   (b) godot-mcp-cli node tests (20/22) via the reusable test_cli.yml
#   (c) the godot_mcp addon-load smoke across Godot 4.3 / 4.4 / 4.5 / 4.6 / 4.7
#       (mono) via the reusable test_godot_plugin.yml
#   (e) the from-scratch terminal-install E2E across the same Godot matrix
#       (test_cli_e2e_install.yml) — MUST stay in lockstep with release.yml's
#       e2e-install legs so a green PR can never produce a red release gate.
#   (d) the runtime INTEGRATION harness across Godot 4.3 / 4.4 / 4.5 / 4.6 / 4.7 (mono) via
#       the reusable test_godot_runtime_harness.yml — downloads the released
#       gamedev-mcp-server, boots a HEADLESS GAME with the in-game runtime +
#       error capture, asserts a live SignalR roundtrip AND runtime-error capture
#       (issue #186). This is the half the #if TOOLS-excluded xUnit suite cannot
#       reach (connect/handshake/dispatch + in-game capture).
#
# NOTE: ci.yml is intentionally left untouched and still runs on push + PR; its
# job display name `dotnet build (.NET 8)` remains the canonical required check.
# The `dotnet-build-test` job below is an additional aggregate signal, NOT a
# rename of that check.
name: Test Pull Request

on:
  workflow_dispatch:
  pull_request:
    types: [opened, synchronize, reopened]

# Auto-cancel superseded runs when a new commit is pushed to the same PR, so
# intermediate pushes don't pile up runner time.
concurrency:
  group: test-pr-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  # (a) .NET build + xUnit (mirrors ci.yml; aggregate signal for this PR run).
  dotnet-build-test:
    name: dotnet build + test (.NET 8)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore Godot-MCP.sln

      - name: Build
        run: dotnet build Godot-MCP.sln --configuration Debug --no-restore

      - name: Test
        run: dotnet test Godot-MCP.Tests/Godot-MCP.Tests.csproj --configuration Debug --no-build --verbosity normal --collect:"XPlat Code Coverage" --results-directory TestResults

      # Coverage REPORTING only — no failing threshold. Publishes the cobertura report
      # produced by coverlet so progress is measurable; the gate never turns red on low coverage.
      - name: Upload .NET coverage report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: dotnet-coverage
          path: TestResults/**/coverage.cobertura.xml
          if-no-files-found: warn
          retention-days: 7

  # (b) godot-mcp-cli node tests (Node 20 & 22).
  test-cli:
    uses: ./.github/workflows/test_cli.yml

  # (c) godot_mcp addon-load smoke across the Godot engine matrix (mono).
  test-godot-4-3:
    uses: ./.github/workflows/test_godot_plugin.yml
    with:
      godotVersion: "4.3.0"

  test-godot-4-4:
    uses: ./.github/workflows/test_godot_plugin.yml
    with:
      godotVersion: "4.4.0"

  test-godot-4-5:
    uses: ./.github/workflows/test_godot_plugin.yml
    with:
      godotVersion: "4.5.1"

  test-godot-4-6:
    uses: ./.github/workflows/test_godot_plugin.yml
    with:
      godotVersion: "4.6.3"

  test-godot-4-7:
    uses: ./.github/workflows/test_godot_plugin.yml
    with:
      godotVersion: "4.7.0"

  # (f) the in-session-rebuild dock-survival guard across the Godot engine matrix
  #     (mono) via the reusable test_godot_dock_reload.yml — boots a headless editor
  #     held open with the dev-control bridge, triggers a GENUINE in-session C#
  #     rebuild (rewrites the assembly on disk → Godot's HotReloadAssemblyWatcher
  #     hot-reloads it), and asserts the "AI Game Developer" dock SURVIVES the reload
  #     (godotengine/godot#51626 "missing dock tab" regression). MUST stay in lockstep
  #     with release.yml's dock-reload legs.
  dock-reload-4-3:
    uses: ./.github/workflows/test_godot_dock_reload.yml
    with:
      godotVersion: "4.3.0"

  dock-reload-4-4:
    uses: ./.github/workflows/test_godot_dock_reload.yml
    with:
      godotVersion: "4.4.0"

  dock-reload-4-5:
    uses: ./.github/workflows/test_godot_dock_reload.yml
    with:
      godotVersion: "4.5.1"

  dock-reload-4-6:
    uses: ./.github/workflows/test_godot_dock_reload.yml
    with:
      godotVersion: "4.6.3"

  dock-reload-4-7:
    uses: ./.github/workflows/test_godot_dock_reload.yml
    with:
      godotVersion: "4.7.0"

  # (e) from-scratch terminal-install E2E across the Godot engine matrix (mono):
  #     build the CLI, scaffold a --dotnet project, run the REAL `install-plugin`
  #     (materialize addon + add NuGet pins + enable), dotnet build, and assert the
  #     editor boots with "[Godot-MCP] plugin loaded". This guards the documented
  #     terminal Quick Start — a regression in create-project / install-plugin that
  #     breaks a from-scratch install breaks this gate.
  e2e-install-4-3:
    uses: ./.github/workflows/test_cli_e2e_install.yml
    with:
      godotVersion: "4.3.0"

  e2e-install-4-4:
    uses: ./.github/workflows/test_cli_e2e_install.yml
    with:
      godotVersion: "4.4.0"

  e2e-install-4-5:
    uses: ./.github/workflows/test_cli_e2e_install.yml
    with:
      godotVersion: "4.5.1"

  e2e-install-4-6:
    uses: ./.github/workflows/test_cli_e2e_install.yml
    with:
      godotVersion: "4.6.3"

  e2e-install-4-7:
    uses: ./.github/workflows/test_cli_e2e_install.yml
    with:
      godotVersion: "4.7.0"

  # Single-source the server version the harness downloads from the addon's authoritative
  # constant (GodotMcpServerView.ServerVersion) instead of trusting the reusable workflow's
  # hardcoded default. This guarantees the harness ALWAYS runs against the server release the
  # addon actually pins; bumping the addon's ServerVersion automatically bumps the harness.
  resolve-server-version:
    runs-on: ubuntu-latest
    outputs:
      serverVersion: ${{ steps.read.outputs.serverVersion }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Read ServerVersion from the addon constant
        id: read
        shell: bash
        run: |
          set -euo pipefail
          src="addons/godot_mcp/Runtime/Connection/GodotMcpServerView.cs"
          version="$(grep -oE 'ServerVersion[[:space:]]*=[[:space:]]*"[0-9]+\.[0-9]+\.[0-9]+"' "$src" \
            | head -n1 | sed -E 's/.*"([0-9]+\.[0-9]+\.[0-9]+)".*/\1/')"
          if [ -z "${version}" ]; then
            echo "::error::Could not read ServerVersion from ${src}"
            exit 1
          fi
          echo "serverVersion=${version}" >> "$GITHUB_OUTPUT"
          echo "Addon-pinned server version: ${version}"

  # (d) the godot_mcp runtime INTEGRATION harness across the Godot engine matrix
  #     (mono). Each leg downloads the released gamedev-mcp-server, boots a
  #     headless game with the in-game runtime + error capture, and asserts the
  #     live SignalR roundtrip + runtime-error capture (issue #186). The 4.5 leg
  #     asserts the engine GDScript backtrace (#163); 4.3/4.4 assert graceful stub
  #     degradation. The serverVersion is single-sourced from the addon constant
  #     (resolve-server-version) so the harness tracks the addon's pinned server.
  runtime-harness-4-3:
    needs: [resolve-server-version]
    uses: ./.github/workflows/test_godot_runtime_harness.yml
    with:
      godotVersion: "4.3.0"
      serverVersion: ${{ needs.resolve-server-version.outputs.serverVersion }}

  runtime-harness-4-4:
    needs: [resolve-server-version]
    uses: ./.github/workflows/test_godot_runtime_harness.yml
    with:
      godotVersion: "4.4.0"
      serverVersion: ${{ needs.resolve-server-version.outputs.serverVersion }}

  runtime-harness-4-5:
    needs: [resolve-server-version]
    uses: ./.github/workflows/test_godot_runtime_harness.yml
    with:
      godotVersion: "4.5.1"
      serverVersion: ${{ needs.resolve-server-version.outputs.serverVersion }}

  runtime-harness-4-6:
    needs: [resolve-server-version]
    uses: ./.github/workflows/test_godot_runtime_harness.yml
    with:
      godotVersion: "4.6.3"
      serverVersion: ${{ needs.resolve-server-version.outputs.serverVersion }}

  runtime-harness-4-7:
    needs: [resolve-server-version]
    uses: ./.github/workflows/test_godot_runtime_harness.yml
    with:
      godotVersion: "4.7.0"
      serverVersion: ${{ needs.resolve-server-version.outputs.serverVersion }}
