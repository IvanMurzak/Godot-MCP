name: Test CLI

# Reusable workflow that builds and tests the godot-mcp-cli npm package under
# cli/ on a Node 20 & 22 matrix. Wiring it into the PR CI pipeline is a
# follow-up task; this file only defines the reusable job.
on:
  workflow_call:

jobs:
  test-cli:
    name: cli (node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: ['20', '22']
    defaults:
      run:
        working-directory: ./cli
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm test -- --coverage

      # Coverage REPORTING only — no failing threshold (vitest v8 provider). Publishes the
      # report so progress is measurable; the gate never turns red on low coverage. Per-node
      # artifact name avoids upload-artifact@v4 duplicate-name collisions across the matrix.
      - name: Upload CLI coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cli-coverage-node-${{ matrix.node-version }}
          path: cli/coverage/**
          if-no-files-found: warn
          retention-days: 7
