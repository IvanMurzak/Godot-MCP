# └──────────────────────────────────────────────────────────────────┘
#
# Reusable workflow: prove the FROM-SCRATCH terminal install actually produces a
# WORKING Godot project. On a clean runner this runs the REAL `godot-cli` flow a
# user would run — there is no committed test project; everything is scaffolded by
# the CLI itself:
#
#   1. build the CLI (cli/) from source;
#   2. in a temp dir, `godot-cli create-project --dotnet`;
#   3. `godot-cli install-plugin --source <repo>/addons/godot_mcp` — the offline /
#      CI path (no GitHub release exists for un-merged code; the default download
#      path is unit-tested with a mocked fetch in cli/tests). This materializes
#      addons/godot_mcp/, adds the two NuGet PackageReferences to the generated
#      csproj, and enables the plugin in project.godot;
#   4. import the project, then build the C# with the CLI's OWN build path
#      (`godot-cli build` — the same build `godot-cli open` runs before launch),
#      NOT a hand-rolled `dotnet build`. The addon globs into the project
#      assembly, so a green build proves it compiles against the addon's pins;
#   5. boot the headless Godot editor and assert "[Godot-MCP] plugin loaded" AND
#      no FileNotFoundException / "Unable to load addon" / assembly-resolution
#      error.
#
# Modeled on test_godot_plugin.yml (same chickensoft-games/setup-godot mono +
# .NET 8 toolchain), but it never copies a pre-made addon into a committed test
# project — it drives the actual terminal commands, so a regression in
# create-project / install-plugin / the build-before-open path (the from-scratch
# story) BREAKS this gate. Because step 4 uses `godot-cli build` instead of a raw
# `dotnet build`, the gate also catches the original "first open disables the
# addon" bug: if the CLI stops building before open, nothing else produces the
# assembly and the plugin-loaded assertion goes red.
# Called once per matrix version by test_pull_request.yml and release.yml.
name: Test CLI E2E Install

on:
  workflow_call:
    inputs:
      godotVersion:
        description: "Godot mono version to install and boot (e.g. 4.3.0, 4.4.0, 4.5.1)."
        required: true
        type: string

jobs:
  e2e-install:
    name: e2e install ${{ inputs.godotVersion }} (mono)
    runs-on: ubuntu-latest
    env:
      # The scaffolded project lives OUTSIDE the repo checkout so the install is a
      # genuine from-scratch consumer (not the in-repo addon source dir).
      WORK: ${{ github.workspace }}/.e2e-consumer
      PROJECT_NAME: E2EConsumer
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "8.0.x"

      - name: Setup Node 22
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Setup Godot ${{ inputs.godotVersion }} (mono)
        uses: chickensoft-games/setup-godot@v2
        with:
          version: ${{ inputs.godotVersion }}
          use-dotnet: true
          include-templates: false

      - name: Report Godot version
        shell: bash
        run: godot --version --headless

      - name: Build the CLI from source
        shell: bash
        working-directory: ./cli
        run: |
          set -euo pipefail
          npm ci
          npm run build
          test -f bin/godot-cli.js

      - name: Scaffold a fresh --dotnet project (the real terminal flow)
        shell: bash
        run: |
          set -euo pipefail
          rm -rf "${WORK}"
          mkdir -p "${WORK}"
          node "${GITHUB_WORKSPACE}/cli/bin/godot-cli.js" create-project \
            --dotnet --name "${PROJECT_NAME}" "${WORK}/project"
          test -f "${WORK}/project/project.godot"
          test -f "${WORK}/project/${PROJECT_NAME}.csproj"

      - name: Install the addon from the repo source (--source, offline/CI path)
        shell: bash
        run: |
          set -euo pipefail
          node "${GITHUB_WORKSPACE}/cli/bin/godot-cli.js" install-plugin \
            --source "${GITHUB_WORKSPACE}/addons/godot_mcp" "${WORK}/project"
          # Addon files materialized.
          test -f "${WORK}/project/addons/godot_mcp/plugin.cfg"
          test -f "${WORK}/project/addons/godot_mcp/Editor/GodotMcpPlugin.cs"
          # Both NuGet pins added to the generated consumer csproj.
          grep -q 'com.IvanMurzak.ReflectorNet' "${WORK}/project/${PROJECT_NAME}.csproj"
          grep -q 'com.IvanMurzak.McpPlugin' "${WORK}/project/${PROJECT_NAME}.csproj"
          # Plugin enabled in project.godot.
          grep -q 'res://addons/godot_mcp/plugin.cfg' "${WORK}/project/project.godot"

      - name: Import the project (generate .godot layout)
        shell: bash
        run: |
          set -uo pipefail
          # A cold project has no .godot/. Headless import materializes the
          # .godot/mono layout; it prints benign "progress dialog" warnings and
          # may exit non-zero on teardown — neither is fatal (the real gates are
          # the dotnet build + the plugin-loaded assertion below). Mirrors
          # test_godot_plugin.yml's import step.
          godot --headless --path "${WORK}/project" --import --quit 2>&1 | tee "${WORK}/import.log" || true
          echo "Import pass complete."

      - name: Build C# via the CLI's OWN build-before-open path (no hand-rolled dotnet build)
        shell: bash
        run: |
          set -euo pipefail
          # This is the crux of the regression guard: build the C# assembly with
          # the SAME `godot-cli build` path that `godot-cli open` runs before it
          # launches the editor — NOT a hand-rolled `dotnet build`. If the CLI ever
          # stops building before open (the original "Unable to load addon …
          # Disabling the addon" bug), `godot-cli build` is the only thing
          # producing the assembly here, so the plugin-loaded assertion below goes
          # red. A raw `dotnet build` would have masked exactly that gap.
          node "${GITHUB_WORKSPACE}/cli/bin/godot-cli.js" build \
            "${WORK}/project" 2>&1 | tee "${WORK}/build.log"
          if ! ls "${WORK}/project"/.godot/mono/temp/bin/*/${PROJECT_NAME}.dll >/dev/null 2>&1; then
            echo "::error::godot-cli build did not produce ${PROJECT_NAME}.dll — the CLI's build-before-open path does not compile the from-scratch install against the addon's NuGet pins."
            cat "${WORK}/build.log" || true
            exit 1
          fi

      - name: Boot editor headless and assert the addon loads
        shell: bash
        run: |
          set -euo pipefail
          godot --headless --path "${WORK}/project" --editor --quit \
            2>&1 | tee "${WORK}/editor-boot.log" || true

          echo "----- editor-boot.log -----"
          cat "${WORK}/editor-boot.log"

          if ! grep -qF "[Godot-MCP] plugin loaded" "${WORK}/editor-boot.log"; then
            echo "::error::'[Godot-MCP] plugin loaded' was NOT found — the from-scratch terminal install did not load on Godot ${{ inputs.godotVersion }}."
            exit 1
          fi

          if grep -qE "FileNotFoundException|Could not load file or assembly|Cannot open file|Failed to load script|Unable to load addon|addon .* failed" "${WORK}/editor-boot.log"; then
            echo "::error::An assembly-resolution / addon-load error appeared in the editor boot output on Godot ${{ inputs.godotVersion }}."
            exit 1
          fi

          # Boot-time McpPlugin ctor skill-gen exception guard (see test_godot_plugin.yml for the full
          # rationale). McpPlugin 6.10.0 auto-runs skill generation in its constructor and throws
          # InvalidOperationException "Cannot resolve relative SkillsPath 'SKILLS' …" unless the addon primes the
          # config (absolute SkillsPath / ProjectRootPath) before McpPluginBuilder.Build(). The ctor catches+logs
          # it, so the plugin still loads, but it spams an ERROR + stack on every boot of a from-scratch install —
          # the exact Quick-Start scenario this E2E guards. Anchor on the version-stable exception-message text.
          if grep -qE "Cannot resolve relative SkillsPath|initial skill generation skipped|skill auto-generation skipped" "${WORK}/editor-boot.log"; then
            echo "::error::McpPlugin ctor skill-generation exception appeared in the from-scratch install boot output on Godot ${{ inputs.godotVersion }} (the addon did not set ConnectionConfig.ProjectRootPath / an absolute SkillsPath before McpPluginBuilder.Build())."
            exit 1
          fi

          echo "Godot ${{ inputs.godotVersion }}: from-scratch terminal install loaded cleanly."

      # Agent-first onboarding surface (design 06 / 09 workflows 1A + 1B):
      # install-plugin --with-server, install-plugin --enroll, and configure --agent.
      # The network legs are STUBBED (the real gamedev-mcp-server download + SHA256
      # verify and the real cloud AS redeem are unit-tested in cli/tests with mocked
      # fetch); here we drive the actual terminal commands end-to-end so a regression
      # in the managed-server-dir path, the redeem → machine-store + marker + pin
      # flow, or the configure proxy BREAKS this gate on the real Godot matrix.
      - name: Exercise agent-first flows (--with-server / --enroll / configure --agent, stubbed network)
        shell: bash
        run: |
          set -euo pipefail
          CLI="${GITHUB_WORKSPACE}/cli/bin/godot-cli.js"

          # A stub managed server binary. The real gamedev-mcp-server download +
          # SHA256SUMS verify is unit-tested with a mocked fetch; --server-source
          # exercises the managed-dir extraction + the configure proxy offline. The
          # stub echoes its argv so the proxy call is observable.
          STUB_SERVER_DIR="${WORK}/stub-server"
          mkdir -p "${STUB_SERVER_DIR}"
          printf '#!/usr/bin/env bash\necho "STUB-SERVER invoked: $*"\n' > "${STUB_SERVER_DIR}/gamedev-mcp-server"
          chmod +x "${STUB_SERVER_DIR}/gamedev-mcp-server"

          # A stub AS enrollment-redeem endpoint (the real redeem needs a live agent
          # JWT); this stubs the HTTP contract so the CLI's redeem → machine-store +
          # marker + pin flow runs end-to-end. Credentials are redirected to a temp
          # dir via AI_GAME_DEV_CREDENTIALS_DIR so we never touch the runner home.
          export AI_GAME_DEV_CREDENTIALS_DIR="${WORK}/store"
          node -e 'const http=require("http");const s=http.createServer((req,res)=>{if(req.method==="POST"&&req.url==="/api/auth/enroll/redeem"){res.setHeader("content-type","application/json");res.end(JSON.stringify({access_token:"stub.jwt",token_type:"Bearer",expires_in:3600,refresh_token:"stub.refresh",scope:"mcp:plugin",server_url:"https://ai-game.dev"}));}else{res.statusCode=404;res.end("{}");}});s.listen(8791,"127.0.0.1",()=>console.log("stub AS on 8791"));' &
          STUB_AS_PID=$!
          trap 'kill "${STUB_AS_PID}" 2>/dev/null || true' EXIT
          for i in $(seq 1 40); do
            curl -s -o /dev/null "http://127.0.0.1:8791/" && break || sleep 0.25
          done

          # install-plugin combining the addon (--source), the managed server
          # (--server-source, offline) AND enrollment (--enroll against the stub AS).
          node "${CLI}" install-plugin \
            --source "${GITHUB_WORKSPACE}/addons/godot_mcp" \
            --with-server --server-source "${STUB_SERVER_DIR}" \
            --enroll "STUB-ENROLL-CODE" --base-url "http://127.0.0.1:8791" \
            "${WORK}/project"

          # --with-server: the managed server binary landed in the CLI-managed dir.
          test -x "${WORK}/project/.ai-game-dev/server/gamedev-mcp-server"
          # --enroll: the plugin credential was planted in the (redirected) machine store.
          test -f "${WORK}/store/credentials.json"
          # --enroll: the project marker records the server target + the D14 pin.
          test -f "${WORK}/project/.ai-game-dev/project.json"
          grep -q '"serverTarget"' "${WORK}/project/.ai-game-dev/project.json"
          grep -q '"pin"' "${WORK}/project/.ai-game-dev/project.json"

          # configure --agent proxies to the managed server binary (the stub echoes its argv).
          CFG_OUT="$(node "${CLI}" configure --agent claude-code "${WORK}/project" 2>&1)"
          echo "${CFG_OUT}"
          echo "${CFG_OUT}" | grep -q "STUB-SERVER invoked: configure --agent claude-code"

          echo "Godot ${{ inputs.godotVersion }}: agent-first flows (--with-server / --enroll / configure --agent) verified."

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: e2e-install-${{ inputs.godotVersion }}-logs
          path: |
            ${{ env.WORK }}/import.log
            ${{ env.WORK }}/build.log
            ${{ env.WORK }}/editor-boot.log
          if-no-files-found: ignore
          retention-days: 7
